[pytest]
testpaths = tests
addopts = -ra --strict-markers
markers =
    xpu: requires Intel XPU runtime (skipped if torch.xpu not available)
    cuda: requires CUDA runtime (skipped if torch.cuda not available)
    cpu: explicitly cpu-only test
    slow: long-running tests (model inference, real audio)
    net: requires internet access
    modelscope: requires modelscope package + remote model download
    pyannote: requires pyannote.audio + HF token
    speakerlab: requires speakerlab / 3D-Speaker
    e2e: end-to-end test over wav fixtures (check files exist, then run pipeline)
filterwarnings =
    ignore::DeprecationWarning
